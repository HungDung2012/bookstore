{% extends 'base.html' %}
{% block title %}Register | Microstore{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Create Account</h1>
    <p>Join Microstore today</p>
</div>
<div class="form-container">
    <div class="glass-card" style="max-width:600px; margin:0 auto;">
        {% if error %}
        <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="form-row">
                <div class="form-group">
                    <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" required placeholder="Choose username...">
                </div>
                <div class="form-group">
                    <label for="email"><i class="fa-solid fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
            </div>
            <div class="form-group">
                <label for="full_name"><i class="fa-solid fa-id-card"></i> Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="Your full name...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone"><i class="fa-solid fa-phone"></i> Phone</label>
                    <input type="text" id="phone" name="phone" placeholder="Phone number...">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" required placeholder="Min 6 characters..." minlength="6">
                </div>
            </div>
            <div class="form-group">
                <label for="address"><i class="fa-solid fa-location-dot"></i> Address</label>
                <input type="text" id="address" name="address" placeholder="Your address...">
            </div>
            <button type="submit" class="action-btn"><i class="fa-solid fa-user-plus"></i> Create Account</button>
        </form>
        <p style="text-align:center; margin-top:1rem; color:var(--text-muted);">
            Already have an account? <a href="/login/" style="color:var(--primary);">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
