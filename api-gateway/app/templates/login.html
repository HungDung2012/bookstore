{% extends 'base.html' %}
{% block title %}Login | Microstore{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Welcome Back</h1>
    <p>Sign in to your account</p>
</div>
<div class="form-container">
    <div class="glass-card" style="max-width:480px; margin:0 auto;">
        {% if error %}
        <div class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username...">
            </div>
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password...">
            </div>
            <button type="submit" class="action-btn"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
        </form>
        <p style="text-align:center; margin-top:1rem; color:var(--text-muted);">
            Don't have an account? <a href="/register/" style="color:var(--primary);">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
