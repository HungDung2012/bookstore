version: '3.8'
services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - book-service
      - inventory-service
      - cart-service
      - order-service
      - payment-service
      - review-service
      - notification-service

  user-service:
    build: ./user-service
    ports:
      - "8001:8000"

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"

  inventory-service:
    build: ./inventory-service
    ports:
      - "8003:8000"

  cart-service:
    build: ./cart-service
    ports:
      - "8004:8000"

  order-service:
    build: ./order-service
    ports:
      - "8005:8000"

  payment-service:
    build: ./payment-service
    ports:
      - "8006:8000"

  review-service:
    build: ./review-service
    ports:
      - "8007:8000"

  notification-service:
    build: ./notification-service
    ports:
      - "8008:8000"
