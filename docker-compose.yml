version: '3.8'

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - book-service
      - inventory-service
      - cart-service
      - order-service
      - payment-service
      - review-service
      - notification-service
      - advisor-service
      - shipping-service
    environment:
      ADVISOR_SERVICE_URL: http://advisor-service:8000
      SHIPPING_SERVICE_URL: http://shipping-service:8000

  user-service:
    build: ./user-service
    ports:
      - "8001:8000"

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"

  inventory-service:
    build: ./inventory-service
    ports:
      - "8003:8000"

  cart-service:
    build: ./cart-service
    ports:
      - "8004:8000"

  order-service:
    build: ./order-service
    ports:
      - "8005:8000"

  payment-service:
    build: ./payment-service
    ports:
      - "8006:8000"

  review-service:
    build: ./review-service
    ports:
      - "8007:8000"

  notification-service:
    build: ./notification-service
    ports:
      - "8008:8000"

  advisor-service:
    build: ./advisor-service
    ports:
      - "8009:8000"
    environment:
      BOOK_SERVICE_URL: http://book-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      REVIEW_SERVICE_URL: http://review-service:8000
      CART_SERVICE_URL: http://cart-service:8000
      USER_SERVICE_URL: http://user-service:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-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}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-bookstore123}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}

  shipping-service:
    build: ./shipping-service
    ports:
      - "8011:8000"
    environment:
      PORT: "8000"
      DEBUG: "false"
      ALLOWED_HOSTS: "*"
      SECRET_KEY: ${SHIPPING_SERVICE_SECRET_KEY:-django-insecure-shipping-service-placeholder-key}
